<!DOCTYPE html>
<html class="staticrypt-html" lang="en">
<head>
<meta charset="utf-8" />
<title>KREA GTM Leader Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="cache-control" content="no-cache" />
<meta http-equiv="expires" content="0" />
<meta http-equiv="pragma" content="no-cache" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
:root{
  --b10-blue:#45AEEB; --b10-blue-hover:#26A6ED; --b10-deep:#1E6AA6;
  --bg:#FFFFFF; --surface-2:#F4F8FB; --border:#E6ECF2; --border-strong:#CDD9E4;
  --text:#1A1A1A; --text-dim:#343434; --text-muted:#6C757D;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
.staticrypt-html{height:100%}
.staticrypt-body{
  height:100%;margin:0;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  color:var(--text); -webkit-font-smoothing:antialiased; line-height:1.55;
  background:
    radial-gradient(ellipse at top right,rgba(69,174,235,0.14),transparent 60%),
    radial-gradient(ellipse at bottom left,rgba(30,106,166,0.07),transparent 55%),
    linear-gradient(180deg,#F4F8FB 0%,#FFFFFF 100%);
}
.hidden{display:none !important}
.staticrypt-content{min-height:100%;display:flex;flex-direction:column}
.staticrypt-page{
  width:100%; max-width:480px; margin:auto; padding:48px 24px;
}
.brand{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:48px}
.brand-mark{font-weight:900;font-size:24px;letter-spacing:-0.5px;color:var(--text)}
.brand-mark sup{color:var(--b10-blue);font-size:13px;top:-0.7em}
.brand-divider{width:1px;height:22px;background:var(--border-strong)}
.brand-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);font-weight:700}
.staticrypt-form{
  background:#FFFFFF;
  border:1px solid var(--border);
  border-radius:18px;
  padding:42px 38px 38px;
  box-shadow:0 10px 40px rgba(26,26,26,0.06), 0 2px 8px rgba(26,26,26,0.03);
  position:relative; overflow:hidden;
}
.staticrypt-form::before{
  content:""; position:absolute; top:0; left:0; right:0; height:4px;
  background:linear-gradient(90deg,var(--b10-deep),var(--b10-blue));
}
.eyebrow{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--b10-blue);font-weight:800;
  padding:5px 11px;background:rgba(69,174,235,0.10);border:1px solid rgba(69,174,235,0.35);border-radius:20px;
  margin-bottom:18px;
}
.staticrypt-instructions{display:block}
.staticrypt-title{
  font-size:24px;font-weight:800;letter-spacing:-0.6px;color:var(--text);
  line-height:1.2;margin-bottom:10px;
}
.staticrypt-instructions p:not(.staticrypt-title){
  font-size:14.5px;color:var(--text-dim);line-height:1.6;
}
.staticrypt-hr{margin:22px 0 22px;border:0;border-top:1px solid var(--border)}
.staticrypt-password-container{
  position:relative;background:var(--surface-2);
  border:1px solid var(--border);border-radius:10px;
  margin-bottom:14px;transition:border-color .15s,background .15s;
}
.staticrypt-password-container:focus-within{
  border-color:var(--b10-blue);
  background:#FFFFFF;
  box-shadow:0 0 0 3px rgba(69,174,235,0.15);
}
.staticrypt-form input[type="password"],
.staticrypt-form input[type="text"]{
  background:transparent;border:0;outline:0;
  font-family:inherit;font-size:15px;color:var(--text);
  padding:15px 44px 15px 16px; width:100%;
}
.staticrypt-toggle-password-visibility{
  cursor:pointer;height:20px;width:20px;padding:14px;
  opacity:0.55;position:absolute;right:0;top:50%;transform:translateY(-50%);
  transition:opacity .15s;box-sizing:content-box;
}
.staticrypt-toggle-password-visibility:hover{opacity:0.85}
.staticrypt-remember{
  display:flex;align-items:center;gap:8px;margin:14px 0 22px;
  font-size:13px;color:var(--text-dim);cursor:pointer;user-select:none;
}
.staticrypt-remember input[type="checkbox"]{
  accent-color:var(--b10-blue);width:15px;height:15px;cursor:pointer;
}
.staticrypt-form .staticrypt-decrypt-button{
  text-transform:uppercase;letter-spacing:1.5px;font-weight:700;font-size:13px;
  font-family:inherit;color:#FFFFFF;
  background:var(--b10-blue);
  border:0;border-radius:10px;
  padding:16px;width:100%;cursor:pointer;
  transition:background .15s,transform .05s;
}
.staticrypt-form .staticrypt-decrypt-button:hover{background:var(--b10-blue-hover)}
.staticrypt-form .staticrypt-decrypt-button:active{transform:translateY(1px);background:var(--b10-deep)}
.staticrypt-form .staticrypt-decrypt-button:focus-visible{outline:3px solid rgba(69,174,235,0.35);outline-offset:2px}
.foot{
  text-align:center;margin-top:24px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-muted);font-weight:600;
}
.staticrypt-spinner-container{
  display:flex;align-items:center;justify-content:center;height:100%;
}
.staticrypt-spinner{
  display:inline-block;width:36px;height:36px;
  vertical-align:text-bottom;border:3px solid rgba(69,174,235,0.25);
  border-right-color:var(--b10-blue);border-radius:50%;
  animation:staticrypt-spin 0.75s linear infinite;
}
@keyframes staticrypt-spin{100%{transform:rotate(360deg)}}
@media screen and (-webkit-min-device-pixel-ratio:0){
  .staticrypt-form input[type="password"],.staticrypt-form input[type="text"]{font-size:16px}
}
@media (max-width:520px){
  .staticrypt-form{padding:32px 26px 28px;border-radius:14px}
  .staticrypt-title{font-size:21px}
}
</style>
</head>

</div>

      toggleIcon.alt = templateToggleAltHide;
    } else {
      passwordInput.type = "password";
      toggleIcon.src = imgSrcEyeOpened;
      toggleIcon.alt = templateToggleAltShow;
    }
  });
}

// handle password form submission
document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
  e.preventDefault();
  const password = document.getElementById("staticrypt-password").value;
  const rememberEl = document.getElementById("staticrypt-remember");
  const isRememberChecked = rememberEl ? rememberEl.checked : false;
  const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);
  if (!isSuccessful) {
    alert(templateError);
  }
});
</script>
